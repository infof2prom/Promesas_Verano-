<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promesas de un verano</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #18212f;
        background: #f6f0df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(248, 205, 112, 0.5), rgba(88, 167, 162, 0.28)),
          #f6f0df;
      }

      main {
        width: min(100%, 760px);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.4rem, 8vw, 5.2rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        max-width: 56ch;
        margin: 0 0 28px;
        font-size: 1.15rem;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid #18212f;
        border-radius: 8px;
        color: #18212f;
        text-decoration: none;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.45);
      }

      a:hover {
        background: #18212f;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Promesas de un verano</h1>
      <p>Proyecto web publicado para compartir el material de Promesas de un verano.</p>
      <a href="menu.pdf">Ver menu</a>
    </main>
  </body>
</html>
